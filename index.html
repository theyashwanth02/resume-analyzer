<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a376c, #276eb8);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 750px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #1a376c; font-size: 28px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
    .upload-area {
      border: 2px dashed #276eb8;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover { background: #f0f7ff; }
    .upload-area p { color: #276eb8; font-size: 16px; margin-top: 10px; }
    .upload-area span { color: #aaa; font-size: 13px; }
    .upload-icon { font-size: 48px; }
    #fileInput { display: none; }
    #fileName { text-align: center; color: #276eb8; font-weight: bold; margin-bottom: 10px; min-height: 20px; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a376c, #276eb8);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loader { display: none; text-align: center; margin: 20px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f0f7ff;
      border-top: 4px solid #276eb8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result {
      display: none;
      margin-top: 30px;
      background: #f8faff;
      border-radius: 12px;
      padding: 25px;
      border-left: 5px solid #276eb8;
    }
    #result h2 { color: #1a376c; margin-bottom: 15px; font-size: 20px; }
    #resultText { color: #333; line-height: 1.8; font-size: 14px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 Resume Analyzer</h1>
    <p class="subtitle">Upload your resume and get instant AI-powered feedback</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📂</div>
      <p>Click to upload your Resume</p>
      <span>Supports PDF files only</span>
    </div>

    <input type="file" id="fileInput" accept=".pdf" onchange="showFileName()" />
    <div id="fileName">No file selected</div>

    <button id="analyzeBtn" onclick="analyzeResume()" disabled>
      🔍 Analyze Resume
    </button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p style="color:#276eb8">Analyzing your resume with AI...</p>
    </div>

    <div id="result">
      <h2>📊 Analysis Result</h2>
      <div id="resultText"></div>
    </div>
  </div>

  <script>
    function showFileName() {
      const file = document.getElementById('fileInput').files[0];
      if (file) {
        document.getElementById('fileName').textContent = '✅ ' + file.name;
        document.getElementById('analyzeBtn').disabled = false;
      }
    }

    async function analyzeResume() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;

      const btn = document.getElementById('analyzeBtn');
      const loader = document.getElementById('loader');
      const result = document.getElementById('result');

      btn.disabled = true;
      loader.style.display = 'block';
      result.style.display = 'none';

      const formData = new FormData();
      formData.append('resume', file);

      try {
        const response = await fetch('http://localhost:3000/analyze', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        loader.style.display = 'none';
        result.style.display = 'block';

        if (data.success) {
          document.getElementById('resultText').textContent = data.analysis;
        } else {
          document.getElementById('resultText').textContent = 'Error: ' + data.error;
        }
      } catch (err) {
        loader.style.display = 'none';
        document.getElementById('resultText').textContent = 'Error connecting to server.';
        result.style.display = 'block';
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
